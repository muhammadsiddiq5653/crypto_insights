<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TraderPro — Sign In</title>
  <style>
    :root {
      --color-bg: #080c1e;
      --color-surface: #0e1228;
      --color-card: #161c35;
      --color-border: #1e2847;
      --color-primary: #6378dc;
      --color-primary-dark: #4f62c8;
      --color-primary-glow: rgba(99,120,220,0.25);
      --color-success: #2dd882;
      --color-danger: #ff5f57;
      --color-text: #e8ecf4;
      --color-text-muted: #8892a4;
      --color-input-bg: #0e1228;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(99,120,220,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 70%, rgba(45,216,130,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grid pattern overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,120,220,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,120,220,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .auth-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 1.5rem;
    }

    /* Logo / Brand */
    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand-logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--color-primary), #8b9ff4);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      margin-bottom: 0.75rem;
      box-shadow: 0 0 30px var(--color-primary-glow);
    }

    .brand-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff 0%, #a8b5e8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-subtitle {
      color: var(--color-text-muted);
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }

    /* Card */
    .auth-card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }

    /* Tabs */
    .tab-bar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1.75rem;
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: var(--color-text-muted);
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.6rem 1rem;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--color-primary);
      color: white;
      box-shadow: 0 2px 12px var(--color-primary-glow);
    }

    /* Form */
    .form-group {
      margin-bottom: 1.1rem;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }

    .form-input {
      width: 100%;
      background: var(--color-input-bg);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      color: var(--color-text);
      font-size: 0.95rem;
      padding: 0.7rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-glow);
    }

    .form-input::placeholder {
      color: var(--color-text-muted);
      opacity: 0.6;
    }

    /* Password toggle */
    .input-wrapper {
      position: relative;
    }

    .input-wrapper .form-input {
      padding-right: 2.75rem;
    }

    .toggle-pw {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--color-text-muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 0.25rem;
      transition: color 0.2s;
    }

    .toggle-pw:hover { color: var(--color-text); }

    /* Submit button */
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.85rem 1.5rem;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: all 0.2s;
      box-shadow: 0 4px 20px var(--color-primary-glow);
      position: relative;
      overflow: hidden;
    }

    .btn-submit:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 30px var(--color-primary-glow);
    }

    .btn-submit:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-submit.loading::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      right: 1.25rem;
      top: 50%;
      transform: translateY(-50%);
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

    /* Alerts */
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .alert-error {
      background: rgba(255,95,87,0.12);
      border: 1px solid rgba(255,95,87,0.3);
      color: #ff8b85;
    }

    .alert-success {
      background: rgba(45,216,130,0.12);
      border: 1px solid rgba(45,216,130,0.3);
      color: #2dd882;
    }

    /* Password hints */
    .pw-hints {
      margin-top: 0.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.25rem;
    }

    .pw-hint {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: color 0.2s;
    }

    .pw-hint.met { color: var(--color-success); }
    .pw-hint .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    /* Divider */
    .divider {
      text-align: center;
      color: var(--color-text-muted);
      font-size: 0.8rem;
      margin: 1.25rem 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--color-border);
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    /* Footer text */
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--color-text-muted);
    }

    /* Panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <!-- Brand -->
    <div class="brand">
      <div class="brand-logo">📈</div>
      <div class="brand-title">TraderPro</div>
      <div class="brand-subtitle">Advanced Crypto Trading Intelligence</div>
    </div>

    <!-- Auth Card -->
    <div class="auth-card">
      <!-- Tab switcher -->
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="login">Sign In</button>
        <button class="tab-btn" data-tab="register">Create Account</button>
      </div>

      <!-- Alert container -->
      <div id="alert-box" style="display:none;"></div>

      <!-- Login panel -->
      <div class="tab-panel active" id="panel-login">
        <form id="form-login">
          <div class="form-group">
            <label class="form-label">Email or Username</label>
            <input class="form-input" type="text" id="login-email" placeholder="you@example.com" autocomplete="username" required />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-wrapper">
              <input class="form-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required />
              <button type="button" class="toggle-pw" data-target="login-password">👁</button>
            </div>
          </div>
          <button type="submit" class="btn-submit" id="btn-login">Sign In</button>
        </form>
      </div>

      <!-- Register panel -->
      <div class="tab-panel" id="panel-register">
        <form id="form-register">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input class="form-input" type="text" id="reg-username" placeholder="traderpro_user" autocomplete="username" required />
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" required />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-wrapper">
              <input class="form-input" type="password" id="reg-password" placeholder="Min 8 chars, 1 uppercase, 1 number" autocomplete="new-password" required />
              <button type="button" class="toggle-pw" data-target="reg-password">👁</button>
            </div>
            <div class="pw-hints">
              <div class="pw-hint" id="hint-len"><span class="dot"></span>8+ characters</div>
              <div class="pw-hint" id="hint-upper"><span class="dot"></span>Uppercase letter</div>
              <div class="pw-hint" id="hint-num"><span class="dot"></span>Number</div>
            </div>
          </div>
          <button type="submit" class="btn-submit" id="btn-register">Create Account</button>
        </form>
      </div>
    </div>

    <!-- Footer -->
    <div class="auth-footer">
      Secure • Private • Local Data Storage
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
