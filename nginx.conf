# ─────────────────────────────────────────────────────────────────────────────
# TraderPro — nginx reverse proxy configuration
#
# Requirements:
#   sudo apt install nginx certbot python3-certbot-nginx
#
# Setup:
#   1. Copy this file to /etc/nginx/sites-available/traderpro
#   2. Replace "traderpro.app" with your actual domain
#   3. sudo ln -s /etc/nginx/sites-available/traderpro /etc/nginx/sites-enabled/
#   4. sudo certbot --nginx -d traderpro.app -d www.traderpro.app
#   5. sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name traderpro.app www.traderpro.app;

    # Allow certbot ACME challenge
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Redirect www → apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.traderpro.app;

    ssl_certificate     /etc/letsencrypt/live/traderpro.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/traderpro.app/privkey.pem;

    return 301 https://traderpro.app$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name traderpro.app;

    # ── TLS ──────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/traderpro.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/traderpro.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ─────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Logging ──────────────────────────────────────────────────────
    access_log /var/log/nginx/traderpro_access.log;
    error_log  /var/log/nginx/traderpro_error.log;

    # ── Gzip (nginx-level, in addition to Node compression) ──────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1024;

    # ── Static assets with long cache ────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API + WebSocket proxy ─────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Don't cache API responses
        proxy_no_cache        1;
        proxy_cache_bypass    1;
    }

    # ── Health check (no logs) ────────────────────────────────────────
    location = /health {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }
}
